version: '3.8'

services:
  nids:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nids-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./app.py:/app/app.py:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a Redis cache layer
  # redis:
  #   image: redis:7-alpine
  #   container_name: nids-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  nids-data:
    driver: local

networks:
  nids-network:
    driver: bridge
