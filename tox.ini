[tox]
envlist = py37,py38,py39,py310,py311,lint,type,coverage
skip_missing_interpreters = True
minversion = 3.20.0

[testenv]
description = Run unit tests
deps =
    pytest>=6.0
    pytest-cov>=2.12
commands =
    pytest {posargs}

[testenv:py{37,38,39,310,311}]
description = Run tests on Python {env:PYTHON_VERSION}
deps =
    -r{toxinidir}/requirements.txt
    pytest>=6.0
    pytest-cov>=2.12
commands =
    pytest --cov=. --cov-report=term-missing

[testenv:lint]
description = Run linting checks (flake8, pylint, black)
skip_install = True
deps =
    flake8>=3.9
    pylint>=2.10
    black>=21.0
    isort>=5.9
commands =
    black --check .
    isort --check-only .
    flake8 . --max-line-length=100 --exclude=.venv,build,dist
    pylint app.py train_model.py test_models.py

[testenv:format]
description = Format code with black and isort
skip_install = True
deps =
    black>=21.0
    isort>=5.9
commands =
    black .
    isort .

[testenv:type]
description = Run type checking with mypy
skip_install = True
deps =
    mypy>=0.950
    types-all
commands =
    mypy app.py train_model.py test_models.py --ignore-missing-imports

[testenv:security]
description = Run security checks with bandit
skip_install = True
deps =
    bandit>=1.7
    pip-audit>=1.0
commands =
    bandit -r . -ll
    pip-audit

[testenv:coverage]
description = Run tests with coverage report and generate HTML report
deps =
    -r{toxinidir}/requirements.txt
    pytest>=6.0
    pytest-cov>=2.12
commands =
    pytest --cov=. --cov-report=html --cov-report=term-missing

[testenv:docs]
description = Check documentation
skip_install = True
commands =
    python -c "import os; assert os.path.exists('README.md'), 'README.md not found'"
    python -c "import os; assert os.path.exists('CONTRIBUTING.md'), 'CONTRIBUTING.md not found'"
    python -c "import os; assert os.path.exists('CODE_OF_CONDUCT.md'), 'CODE_OF_CONDUCT.md not found'"
    python -c "import os; assert os.path.exists('CHANGELOG.md'), 'CHANGELOG.md not found'"

[testenv:all]
description = Run all checks and tests
skip_install = False
deps =
    -r{toxinidir}/requirements.txt
    pytest>=6.0
    pytest-cov>=2.12
    flake8>=3.9
    pylint>=2.10
    black>=21.0
    isort>=5.9
    mypy>=0.950
    bandit>=1.7
    pip-audit>=1.0
commands =
    black --check .
    isort --check-only .
    flake8 . --max-line-length=100 --exclude=.venv,build,dist
    pylint app.py train_model.py test_models.py
    bandit -r . -ll
    pytest --cov=. --cov-report=term-missing

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short

[flake8]
max-line-length = 100
exclude = .git,__pycache__,.venv,build,dist,.eggs
ignore = E203,W503,W504
per-file-ignores =
    __init__.py:F401
    tests/*:F401,F811

[coverage:run]
branch = True
source = .
omit =
    */tests/*
    */test_*.py
    .venv/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
