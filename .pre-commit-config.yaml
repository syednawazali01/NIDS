# Pre-commit framework configuration
# Install with: pip install pre-commit
# Setup with: pre-commit install
# See https://pre-commit.com for more information

default_language_version:
  python: python3.10

repos:
  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML
        args: ['--unsafe']
      - id: check-json
        name: Check JSON
      - id: check-merge-conflict
        name: Check merge conflicts
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: detect-private-key
        name: Detect private keys
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']

  # Python code formatting with Black
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        name: Format code with Black
        language_version: python3.10
        args: ['--line-length=100']

  # Import sorting with isort
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: Sort imports with isort
        args: ['--profile=black', '--line-length=100']

  # Linting with flake8
  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        name: Check code style with flake8
        args: ['--max-line-length=100', '--extend-ignore=E203,W503']
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Check security issues with bandit
        args: ['-ll']
        exclude: ^tests/

  # Type checking with mypy (optional, commented out)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.2.0
  #   hooks:
  #     - id: mypy
  #       name: Type checking with mypy
  #       additional_dependencies: ['types-all']
  #       args: ['--ignore-missing-imports']

  # Docstring coverage (optional)
  - repo: https://github.com/econchick/interrogate
    rev: 1.5.0
    hooks:
      - id: interrogate
        name: Check docstring coverage
        args: ['-vv', '--fail-under=50', '--ignore-init-method']

  # Spell checking (optional, commented out)
  # - repo: https://github.com/codespell-project/codespell
  #   rev: v2.2.4
  #   hooks:
  #     - id: codespell
  #       name: Check spelling
  #       args: ['--skip=.git,models,data']

# Global exclusions
exclude: |
  (?x)^(
    .venv|
    venv|
    build|
    dist|
    \.egg-info|
    __pycache__|
    \.pytest_cache|
    \.mypy_cache|
    \.tox|
    models/|
    data/
  )

# CI skip option: add [skip pre-commit] to commit message to skip all checks
fail_fast: false
